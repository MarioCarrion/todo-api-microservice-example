openapi: 3.0.3
info:
  title: Task API
  version: 1.0.0
paths:
  /tasks:
    post:
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTasksRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTasksResponse'
        '400':
          description: Invalid request
  /tasks/{id}:
    get:
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}'
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadTasksResponse'
        '404':
          description: Task not found
    put:
      summary: Update a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTasksRequest'
      responses:
        '200':
          description: Task updated
        '400':
          description: Invalid request
        '404':
          description: Task not found
    delete:
      summary: Delete a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}'
      responses:
        '200':
          description: Task deleted
        '404':
          description: Task not found
  /search/tasks:
    post:
      summary: Search for tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchTasksRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchTasksResponse'
        '400':
          description: Invalid request
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        dates:
          $ref: '#/components/schemas/Dates'
        is_done:
          type: boolean
      required: [id, description, priority, dates, is_done]
    CreateTasksRequest:
      type: object
      properties:
        description:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        dates:
          $ref: '#/components/schemas/Dates'
      required: [description, priority, dates]
    CreateTasksResponse:
      type: object
      properties:
        task:
          $ref: '#/components/schemas/Task'
      required: [task]
    ReadTasksResponse:
      type: object
      properties:
        task:
          $ref: '#/components/schemas/Task'
      required: [task]
    UpdateTasksRequest:
      type: object
      properties:
        description:
          type: string
        is_done:
          type: boolean
        priority:
          $ref: '#/components/schemas/Priority'
        dates:
          $ref: '#/components/schemas/Dates'
      required: [description, is_done, priority, dates]
    SearchTasksRequest:
      type: object
      properties:
        description:
          type: string
          nullable: true
        priority:
          $ref: '#/components/schemas/Priority'
          nullable: true
        is_done:
          type: boolean
          nullable: true
        from:
          type: integer
          format: int64
        size:
          type: integer
          format: int64
      required: [from, size]
    SearchTasksResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
          format: int64
      required: [tasks, total]
    Priority:
      type: string
      description: Priority value
      enum:
        - low
        - medium
        - high
    Dates:
      type: object
      description: Dates value (custom type, see implementation)
